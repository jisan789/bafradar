<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="একটি পূর্ণাঙ্গ আবহাওয়ার ড্যাশবোর্ড।">
  <title>আবহাওয়ার ড্যাশবোর্ড</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
:root {
  --bg-color: #FDFBFF;
  --surface: #FDFBFF;
  --surface-muted: #F3F3FA;
  --text-primary: #1A1B1F;
  --text-secondary: #44474E;
  --accent: #005AC1;
  --accent-soft: #D8E2FF;
  --border-color: #C4C6D0;
  --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
  --shadow-hover: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  padding: 0;
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: 'Roboto', 'Hind Siliguri', sans-serif;
  overflow-x: hidden;
}

.page-glow {
  display: none;
}

.dashboard-container {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 16px;
  background: var(--bg-color);
  animation: pageEnter 0.55s cubic-bezier(0.2, 0, 0, 1) both;
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

.panel {
  background: var(--surface-muted);
  border: none;
  border-radius: var(--radius-lg);
  box-shadow: none;
  transition: var(--transition);
}

.panel:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 8px 4px 16px;
  position: sticky;
  top: 0;
  background: var(--bg-color);
  z-index: 10;
}

.app-header h1 {
  margin-top: 2px;
  font-size: 1.75rem;
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.eyebrow {
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 500;
  font-size: 0.85rem;
  white-space: nowrap;
  box-shadow: none;
}

.app-footer {
  padding: 8px 0 2px;
  color: var(--text-secondary);
  font-size: 0.85rem;
  text-align: center;
  animation: fadeUp 0.5s ease 0.18s both;
}

.search-section {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 8px;
  background: var(--surface-muted);
  border-radius: var(--radius-full);
}

.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 14px 20px;
  border: none;
  border-radius: var(--radius-full);
  background: transparent;
  transition: var(--transition);
}

.search-box:focus-within {
  background: var(--surface);
  box-shadow: var(--shadow);
}

.search-icon {
  margin-right: 12px;
  color: var(--text-secondary);
  font-size: 1.3rem;
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text-primary);
  font-size: 1.05rem;
  font-weight: 400;
}

.search-box input::placeholder {
  color: var(--text-secondary);
}

.icon-btn {
  width: 52px;
  height: 52px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--accent);
  color: #ffffff;
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 1.4rem;
  transition: var(--transition);
  box-shadow: 0 4px 8px rgba(0, 90, 193, 0.25);
}

.icon-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 12px rgba(0, 90, 193, 0.3);
}

#dashboard-content {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

#dashboard-content:not(.hidden) > * {
  animation: fadeUp 0.45s ease both;
}

#dashboard-content:not(.hidden) > *:nth-child(2) {
  animation-delay: 0.05s;
}

#dashboard-content:not(.hidden) > *:nth-child(3) {
  animation-delay: 0.1s;
}

#dashboard-content:not(.hidden) > *:nth-child(4) {
  animation-delay: 0.15s;
}

.current-weather {
  display: grid;
  grid-template-columns: auto auto 1fr;
  grid-template-rows: auto auto;
  align-items: center;
  gap: 16px 20px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

.current-main {
  display: contents;
}

.weather-animation {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  opacity: 0.9;
}

.weather-animation::before,
.weather-animation::after {
  content: '';
  position: absolute;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.weather-animation.is-calm::before {
  right: 24px;
  top: 30px;
  width: 170px;
  height: 64px;
  border-radius: 999px;
  background:
    radial-gradient(circle at 26% 48%, #eef2ff 0 26px, transparent 27px),
    radial-gradient(circle at 52% 34%, #e0f2fe 0 34px, transparent 35px),
    radial-gradient(circle at 76% 54%, #f1f5f9 0 25px, transparent 26px),
    linear-gradient(#eef2ff, #eef2ff);
  background-position: 0 0, 0 0, 0 0, 18px 34px;
  background-size: 100% 100%, 100% 100%, 100% 100%, 132px 24px;
  background-repeat: no-repeat;
  opacity: 0.8;
  animation: cloudDrift 7s ease-in-out infinite;
}

.rain-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.sun-orb {
  position: absolute;
  right: 32px;
  top: 26px;
  width: 66px;
  height: 66px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 35%, #fff7b1 0 18%, #fbbf24 52%, #f59e0b 100%);
  box-shadow:
    0 0 0 12px rgba(251, 191, 36, 0.12),
    0 0 36px rgba(245, 158, 11, 0.28);
  opacity: 0;
  transform: scale(0.9);
}

.sun-orb::before {
  content: '';
  position: absolute;
  inset: -18px;
  border-radius: 50%;
  background:
    repeating-conic-gradient(
      from 0deg,
      rgba(245, 158, 11, 0.28) 0deg 9deg,
      transparent 9deg 22deg
    );
  -webkit-mask: radial-gradient(circle, transparent 0 56%, #000 58% 100%);
  mask: radial-gradient(circle, transparent 0 56%, #000 58% 100%);
}

.heat-wave {
  position: absolute;
  right: 24px;
  width: 136px;
  height: 44px;
  opacity: 0;
  background:
    radial-gradient(ellipse at center, transparent 54%, rgba(245, 158, 11, 0.28) 56% 60%, transparent 62%);
  filter: blur(0.2px);
}

.heat-wave::before,
.heat-wave::after {
  content: '';
  position: absolute;
  inset: 8px 12px;
  border-radius: 50%;
  border-top: 2px solid rgba(245, 158, 11, 0.22);
}

.heat-wave-one {
  top: 98px;
}

.heat-wave-two {
  top: 128px;
}

.rain {
  display: none;
}

.rain-two {
  display: none;
}

.lightning {
  position: absolute;
  right: 62px;
  top: 38px;
  width: 34px;
  height: 86px;
  opacity: 0;
  background: #facc15;
  clip-path: polygon(48% 0, 100% 0, 68% 38%, 96% 38%, 26% 100%, 44% 50%, 12% 50%);
  filter: drop-shadow(0 0 12px rgba(250, 204, 21, 0.8));
}

.weather-animation.is-rain::before,
.weather-animation.is-thunder::before {
  left: 28px;
  top: 22px;
  width: 188px;
  height: 74px;
  border-radius: 999px;
  background:
    radial-gradient(circle at 28% 42%, #dbeafe 0 28px, transparent 29px),
    radial-gradient(circle at 50% 30%, #bfdbfe 0 36px, transparent 37px),
    radial-gradient(circle at 72% 48%, #dbeafe 0 30px, transparent 31px),
    linear-gradient(#dbeafe, #dbeafe);
  background-position: 0 0, 0 0, 0 0, 16px 38px;
  background-size: 100% 100%, 100% 100%, 100% 100%, 150px 26px;
  background-repeat: no-repeat;
  opacity: 0.68;
}

.weather-animation.is-thunder::before {
  background:
    radial-gradient(circle at 28% 42%, #cbd5e1 0 28px, transparent 29px),
    radial-gradient(circle at 50% 30%, #94a3b8 0 36px, transparent 37px),
    radial-gradient(circle at 72% 48%, #cbd5e1 0 30px, transparent 31px),
    linear-gradient(#cbd5e1, #cbd5e1);
  background-position: 0 0, 0 0, 0 0, 16px 38px;
  background-size: 100% 100%, 100% 100%, 100% 100%, 150px 26px;
  background-repeat: no-repeat;
}

.weather-animation.is-thunder::after {
  inset: 0;
  background: rgba(255, 255, 255, 0.68);
}

.weather-animation.is-sunny .sun-orb,
.weather-animation.is-summer .sun-orb {
  opacity: 1;
  animation:
    sunFloat 5s ease-in-out infinite,
    sunRaySpin 18s linear infinite;
}

.weather-animation.is-summer .heat-wave {
  opacity: 1;
  animation: heatRise 2.8s ease-in-out infinite;
}

.weather-animation.is-summer .heat-wave-two {
  animation-delay: 0.5s;
}

.weather-animation.is-rain .rain-canvas,
.weather-animation.is-thunder .rain-canvas {
  opacity: 1;
}

.weather-animation.is-thunder .lightning,
.weather-animation.is-thunder::after {
  animation: thunderFlash 4.8s linear infinite;
}

.icon-halo {
  grid-column: 1;
  grid-row: 1;
  position: relative;
  z-index: 1;
  width: 86px;
  height: 86px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: var(--accent-soft);
  transition: transform 0.2s ease;
}

.main-icon {
  width: 78px;
  height: 78px;
  animation: iconFloat 4.5s ease-in-out infinite;
}

.temp-box {
  grid-column: 2;
  grid-row: 1;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
}

#current-temp {
  font-size: 4rem;
  font-weight: 700;
  line-height: 1;
}

.unit-toggle {
  display: flex;
  align-items: center;
  margin-top: 6px;
  margin-left: 4px;
  color: var(--text-secondary);
  font-size: 1rem;
}

.unit-toggle button {
  padding: 0 4px;
  border: 0;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1rem;
}

.unit-toggle button.active {
  color: var(--text-primary);
  font-weight: 700;
}

.divider {
  margin: 0 2px;
}

.current-details-list {
  grid-column: 1 / -1;
  grid-row: 2;
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  width: 100%;
  margin-top: 8px;
}

.current-details-list p {
  display: grid;
  gap: 6px;
  padding: 16px 12px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--bg-color);
  transition: var(--transition);
  text-align: center;
  align-items: center;
  justify-items: center;
}

.current-details-list p:hover {
  background: var(--accent-soft);
}

.current-details-list i {
  color: var(--accent);
  font-size: 1.4rem;
}

.current-details-list span {
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-weight: 500;
}

.current-details-list strong {
  color: var(--text-primary);
  font-size: 1.05rem;
  font-weight: 600;
}

.current-location-info {
  grid-column: 3;
  grid-row: 1;
  position: relative;
  z-index: 1;
  justify-self: end;
  min-width: 180px;
  text-align: right;
}

#city-name {
  margin-bottom: 4px;
  font-size: 1.6rem;
  font-weight: 700;
}

#current-day-time,
#current-condition {
  color: var(--text-secondary);
  font-size: 0.98rem;
  font-weight: 400;
}

#current-condition {
  margin-top: 4px;
  text-transform: capitalize;
}

.tabs {
  display: flex;
  gap: 12px;
  padding: 16px 16px 0;
  border-bottom: 1px solid var(--border-color);
  overflow-x: auto;
  scrollbar-width: none;
}

.tab {
  padding: 10px 16px;
  border: 0;
  border-bottom: 3px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  white-space: nowrap;
  transition: var(--transition);
}

.tab:hover {
  background: rgba(0, 90, 193, 0.04);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}

.tab.active {
  border-bottom-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.chart-container {
  width: 100%;
  padding: 12px 14px 16px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
}

.chart-container::-webkit-scrollbar {
  height: 6px;
}

.chart-container::-webkit-scrollbar-track {
  background: var(--surface-muted);
}

.chart-container::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.chart-wrapper {
  height: 210px;
  position: relative;
}

.chart-rain-canvas,
.chart-wind-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.satellite-section {
  padding: 16px;
}

.section-heading {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 12px;
}

.section-heading h2 {
  margin-top: 4px;
  font-size: 1.15rem;
  font-weight: 700;
}

.satellite-frame {
  width: min(100%, 600px);
  margin: 0 auto;
  overflow: hidden;
  aspect-ratio: 1 / 1;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  background: var(--surface-muted);
  transition: border-color 0.2s ease, transform 0.2s ease;
}

.satellite-frame:hover {
  border-color: rgba(37, 99, 235, 0.32);
  transform: translateY(-2px);
}

.satellite-frame img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  background: #0f172a;
}

.forecast-container {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 4px 4px 16px;
}

.forecast-container::-webkit-scrollbar {
  display: none;
}

.forecast-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 0 0 auto;
  min-width: 110px;
  padding: 18px 14px;
  border: none;
  border-radius: var(--radius-lg);
  background: var(--surface-muted);
  cursor: pointer;
  transition: var(--transition);
}

.forecast-card:hover,
.forecast-card.active {
  background: var(--accent-soft);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0, 90, 193, 0.1);
}

.forecast-day {
  margin-bottom: 8px;
  font-size: 0.95rem;
  font-weight: 700;
}

.forecast-icon {
  width: 42px;
  height: 42px;
  margin-bottom: 8px;
}

.forecast-temps {
  display: flex;
  gap: 8px;
  font-size: 0.92rem;
}

.temp-high {
  color: var(--text-primary);
  font-weight: 700;
}

.temp-low {
  color: var(--text-secondary);
}

.forecast-wind {
  margin-top: 10px;
  color: var(--text-secondary);
  font-size: 0.8rem;
  text-align: center;
  white-space: normal;
  line-height: 1.3;
}

.hidden {
  display: none !important;
}

.error-msg {
  padding: 14px;
  border: 1px solid #fecaca;
  border-radius: 12px;
  background: #fff1f2;
  color: #b42318;
  text-align: center;
}

#loading {
  padding: 34px 0;
  text-align: center;
}

.spinner {
  width: 28px;
  height: 28px;
  margin: 0 auto;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@keyframes pageEnter {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes softPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
  }
  50% {
    box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.05);
  }
}

@keyframes iconFloat {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-4px);
  }
}

@keyframes cloudDrift {
  0%, 100% {
    transform: translateX(0);
  }
  50% {
    transform: translateX(-12px);
  }
}

@keyframes sunFloat {
  0%, 100% {
    transform: translateY(0) scale(0.96);
    box-shadow:
      0 0 0 12px rgba(251, 191, 36, 0.1),
      0 0 30px rgba(245, 158, 11, 0.24);
  }
  50% {
    transform: translateY(-5px) scale(1.03);
    box-shadow:
      0 0 0 20px rgba(251, 191, 36, 0.16),
      0 0 42px rgba(245, 158, 11, 0.32);
  }
}

@keyframes sunRaySpin {
  to {
    rotate: 360deg;
  }
}

@keyframes heatRise {
  0% {
    transform: translateY(10px) scaleX(0.88);
    opacity: 0;
  }
  45% {
    opacity: 0.85;
  }
  100% {
    transform: translateY(-22px) scaleX(1.12);
    opacity: 0;
  }
}

@keyframes thunderFlash {
  0%, 82%, 86%, 91%, 100% {
    opacity: 0;
  }
  83%, 84% {
    opacity: 0.95;
  }
  88% {
    opacity: 0.45;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 760px) {
  .dashboard-container {
    padding: 12px;
    border-radius: 0;
  }

  .app-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .current-weather {
    grid-template-columns: auto auto;
    justify-content: center;
    gap: 16px;
  }

  .icon-halo {
    grid-column: 1;
    grid-row: 1;
  }

  .temp-box {
    grid-column: 2;
    grid-row: 1;
  }

  .current-location-info {
    grid-column: 1 / -1;
    grid-row: 2;
    justify-self: center;
    text-align: center;
    min-width: 0;
  }

  .current-details-list {
    grid-column: 1 / -1;
    grid-row: 3;
    width: 100%;
    grid-template-columns: 1fr;
  }

  .current-details-list p {
    grid-template-columns: auto 1fr auto;
    align-items: center;
    text-align: left;
  }

  .tabs {
    overflow-x: auto;
  }

  .satellite-section {
    padding: 12px;
  }

  .satellite-frame {
    width: 100%;
    border-radius: 10px;
  }

  .forecast-container {
    grid-template-columns: repeat(7, 96px);
  }
}

@media (max-width: 480px) {
  .app-header h1 {
    font-size: 1.65rem;
  }

  #current-temp {
    font-size: 3.2rem;
  }

  .search-section {
    padding: 8px;
  }

  .section-heading h2 {
    font-size: 1rem;
  }
}

  </style>

</head>
<body>
  <div class="page-glow page-glow-one"></div>
  <div class="page-glow page-glow-two"></div>

  <div class="dashboard-container">
    <header class="app-header">
      <div>
        <p class="eyebrow">লাইভ আবহাওয়া</p>
        <h1>আবহাওয়ার পূর্বাভাস</h1>
      </div>
      <div class="status-pill">
        <i class="ph ph-sparkle"></i>
        <span>৭ দিনের পূর্বাভাস</span>
      </div>
    </header>

    <div class="search-section panel">
      <div class="search-box">
        <i class="ph ph-magnifying-glass search-icon"></i>
        <input type="text" id="city" placeholder="শহর খুঁজুন..." autocomplete="off">
      </div>

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {

      fetchDataByCoords(currentCoords.lat, currentCoords.lon, true);
    } else if (currentCity) {

}

function initializeLocation() {
  const savedLocation = getSavedLocation();

  if (savedLocation?.type === "coords") {
    fetchDataByCoords(savedLocation.lat, savedLocation.lon);
    return;
  }

  if (savedLocation?.type === "city") {
    fetchData(savedLocation.city);
    return;
  }

  fetchCurrentLocation(true);
}

function getSavedLocation() {
  try {
    const savedLocation = JSON.parse(localStorage.getItem(locationCacheKey));

    if (!savedLocation || Date.now() > savedLocation.expiresAt) {
      localStorage.removeItem(locationCacheKey);
      return null;
    }

    return savedLocation;
  } catch (err) {
    localStorage.removeItem(locationCacheKey);
    return null;
  }
}

}

function saveLocation(location) {
  try {
    localStorage.setItem(
      locationCacheKey,
      JSON.stringify({
        ...location,
        expiresAt: Date.now() + locationCacheDuration

  } catch (err) {

  }
}

}

// Fetch Functions
async function fetchData(city, silent = false) {

    const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric&lang=bn`);

    if (!weatherRes.ok) throw new Error("শহর খুঁজে পাওয়া যায়নি।");

    weatherData = await weatherRes.json();
    forecastData = await fetchExtendedForecast(
      weatherData.coord.lat,
      weatherData.coord.lon
    );
    
    currentCity = weatherData.name;
    currentCoords = null;
    saveCityLocation(currentCity);
    updateUI();
  } catch (err) {
    if (!silent) showError(err.message);
  }
}

async function fetchDataByCoords(lat, lon, silent = false) {
  if (!silent) showLoading();
  try {
    const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=bn`);

    if (!weatherRes.ok) throw new Error("লোকেশন খুঁজে পাওয়া যায়নি।");

    weatherData = await weatherRes.json();
    forecastData = await fetchExtendedForecast(lat, lon);
    
    currentCity = weatherData.name;
    currentCoords = { lat, lon };
    saveCoordsLocation(lat, lon);
    updateUI();
  } catch (err) {
    if (!silent) showError(err.message);
  }
}

async function fetchExtendedForecast(lat, lon) {
  const params = new URLSearchParams({
    latitude: lat,
    longitude: lon,
    timezone: "auto",
    forecast_days: "7",
    hourly: [
      "temperature_2m",
      "precipitation_probability",
      "wind_speed_10m",
      "wind_direction_10m",
      "weather_code"
    ].join(","),
    daily: [
      "weather_code",
      "temperature_2m_max",
      "temperature_2m_min"
    ].join(",")
  });

  const response = await fetch(`${openMeteoBaseUrl}?${params.toString()}`);
  if (!response.ok) throw new Error("পূর্বাভাস পাওয়া যাচ্ছে না।");

  const data = await response.json();
  return normalizeForecastData(data);
}

function normalizeForecastData(data) {
  const periods = data.hourly.time
    .map((time, index) => {
      const date = new Date(time);

      // Keep the chart readable while extending the range to 7 days.
      if (date.getHours() % 3 !== 0) return null;

      return {
        dt: Math.floor(date.getTime() / 1000),
        main: {
          temp: data.hourly.temperature_2m[index]
        },
        pop: (data.hourly.precipitation_probability[index] || 0) / 100,
        wind: {
          speed: (data.hourly.wind_speed_10m[index] || 0) / 3.6,
          deg: data.hourly.wind_direction_10m[index]
        },
        weather: [{
          icon: mapWeatherCodeToIcon(data.hourly.weather_code[index]),
          code: data.hourly.weather_code[index]
        }]
      };
    })
    .filter(Boolean);

  const daily = data.daily.time.map((time, index) => {
    const date = new Date(time);
    const dayPeriods = periods.filter((period) => {
      const periodDate = new Date(period.dt * 1000);
      return periodDate.toDateString() === date.toDateString();
    });
    const firstIndex = periods.findIndex((period) => {
      const periodDate = new Date(period.dt * 1000);
      return periodDate.toDateString() === date.toDateString();
    });

    return {
      day: date.toLocaleDateString(locale, { weekday: "short" }),
      icon: mapWeatherCodeToIcon(data.daily.weather_code[index]),
      maxTemp: data.daily.temperature_2m_max[index],
      minTemp: data.daily.temperature_2m_min[index],
      windDeg: getAverageWindDirection(dayPeriods),
      windSpeed: getAverageWindSpeed(dayPeriods),
      firstIndex: firstIndex === -1 ? 0 : firstIndex
    };
  });

  return { list: periods, daily };
}

function mapWeatherCodeToIcon(code) {
  if (code === 0) return "01d";
  if (code === 1) return "02d";
  if (code === 2) return "03d";
  if (code === 3) return "04d";
  if ([45, 48].includes(code)) return "50d";
  if ([51, 53, 55, 56, 57].includes(code)) return "09d";
  if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "10d";
  if ([71, 73, 75, 77, 85, 86].includes(code)) return "13d";
  if ([95, 96, 99].includes(code)) return "11d";
  return "03d";
}

function getWeatherAnimationType(weather, tempCelsius) {
  const id = weather?.id;
  const icon = weather?.icon || "";
  const description = (weather?.description || "").toLowerCase();

  if (id >= 200 && id < 300) return "thunder";
  if ((id >= 300 && id < 600) || description.includes("rain")) return "rain";
  if (typeof tempCelsius === "number" && tempCelsius >= 32) return "summer";
  if (id === 800 || icon.includes("01")) return "sunny";
  if (description.includes("hot") || description.includes("summer")) return "summer";
  return "calm";
}

function updateWeatherAnimation(weather, tempCelsius) {

  if (animationType === "rain" || animationType === "thunder") {
    if (!rainRenderer && rainCanvasEl) {
      rainRenderer = new RainRenderer(rainCanvasEl);
    }
    rainRenderer?.start();
  } else {
    rainRenderer?.stop();
  }
}

class RainRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.context = canvas.getContext("2d");
    this.rainDrops = [];
    this.animationFrame = null;
    this.isRunning = false;
    this.pixelRatio = window.devicePixelRatio || 1;
    this.boundRender = this.render.bind(this);
    this.boundResize = this.resize.bind(this);
    this.clipPath = null;
  }

  setClipPath(pathFn) {
    this.clipPath = pathFn;
  }

  start() {
    this.resize();
    window.addEventListener("resize", this.boundResize);

    if (!this.rainDrops.length) {
      this.createRainDrops(220, true);
    }

    if (!this.isRunning) {
      this.isRunning = true;
      this.render();
    }
  }

  stop() {
    this.isRunning = false;
    window.removeEventListener("resize", this.boundResize);

    if (this.animationFrame) {
      cancelAnimationFrame(this.animationFrame);
      this.animationFrame = null;
    }

    this.context?.clearRect(0, 0, this.width || 0, this.height || 0);
    this.rainDrops = [];
  }

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    this.width = Math.max(1, rect.width);
    this.height = Math.max(1, rect.height);
    this.pixelRatio = window.devicePixelRatio || 1;

    this.canvas.width = Math.floor(this.width * this.pixelRatio);
    this.canvas.height = Math.floor(this.height * this.pixelRatio);
    this.context.setTransform(this.pixelRatio, 0, 0, this.pixelRatio, 0, 0);
  }

  getRandomValue(range) {
    return range.min + (range.max - range.min) * Math.random();
  }

  createRainDrops(count, toInit) {
    for (let i = 0; i < count; i++) {
      this.rainDrops.push(new RainDrop(this.width, this.height, toInit, this));
    }
  }

  render() {
    if (!this.isRunning) return;

    this.animationFrame = requestAnimationFrame(this.boundRender);
    this.context.clearRect(0, 0, this.width, this.height);

    if (this.clipPath) {
      this.context.save();
      this.clipPath(this.context);
      this.context.clip();
    }

    for (let i = this.rainDrops.length - 1; i >= 0; i--) {
      if (!this.rainDrops[i].render(this.context, false)) {
        this.rainDrops.splice(i, 1);
      }
    }

    for (let i = this.rainDrops.length - 1; i >= 0; i--) {
      if (!this.rainDrops[i].render(this.context, true)) {
        this.rainDrops.splice(i, 1);
      }
    }

    if (this.clipPath) {
      this.context.restore();
    }

    this.createRainDrops(5, false);
  }
}

class RainDrop {
  constructor(width, height, toInit, renderer) {
    this.width = width;
    this.height = height;
    this.toInit = toInit;
    this.renderer = renderer;
    this.init();
  }

  init() {
    this.scale = this.renderer.getRandomValue({ min: 0.28, max: 1 });
    this.length = 22 * this.scale;
    this.vx = this.renderer.getRandomValue({ min: -1.6, max: -0.8 }) * this.scale;
    this.vy = 3.2 * this.scale;
    this.ay = 0.018 * this.scale;
    this.theta = Math.atan2(this.vy, this.vx);
    this.offset = this.height * 0.04;
    this.x = this.renderer.getRandomValue({ min: 0, max: this.width + 60 });
    this.y = (this.toInit ? this.renderer.getRandomValue({ min: 0, max: this.height }) : 0) - this.offset;
    this.radius = this.length * 0.02;
  }

  render(context, toFront) {
    const frontThreshold = 0.78;
    if ((toFront && this.scale < frontThreshold) || (!toFront && this.scale >= frontThreshold)) {
      return true;
    }

    context.save();
    context.strokeStyle = "rgba(37, 99, 235, 0.34)";

    if (this.y >= this.height * (1 - (1 - this.scale) * 0.58) - this.offset) {
      context.lineWidth = 2;
      context.globalAlpha = Math.max(0, (1 - this.radius / this.length / 0.22) * 0.45);
      context.beginPath();
      context.arc(this.x, this.y, this.radius, Math.PI, Math.PI * 2, false);
      context.stroke();
      context.restore();

      this.radius *= 1.08;
      return this.radius <= this.length * 0.22;
    }

    context.lineWidth = this.scale > frontThreshold ? 1.4 : 0.8;
    context.globalAlpha = this.scale > frontThreshold ? 0.55 : 0.32;
    context.beginPath();
    context.moveTo(this.x, this.y);
    context.lineTo(this.x + this.length * Math.cos(this.theta), this.y + this.length * Math.sin(this.theta));
    context.stroke();
    context.restore();

    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.ay;
    return true;
  }
}

class WindRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.context = canvas.getContext("2d");
    this.particles = [];
    this.animationFrame = null;
    this.isRunning = false;
    this.pixelRatio = window.devicePixelRatio || 1;
    this.boundRender = this.render.bind(this);
    this.boundResize = this.resize.bind(this);
    this.clipPath = null;
  }

  setClipPath(pathFn) {
    this.clipPath = pathFn;
  }

  start() {
    this.resize();
    window.addEventListener("resize", this.boundResize);
    if (!this.particles.length) {
      this.createParticles(70);
    }
    if (!this.isRunning) {
      this.isRunning = true;
      this.render();
    }
  }

  stop() {
    this.isRunning = false;
    window.removeEventListener("resize", this.boundResize);
    if (this.animationFrame) {
      cancelAnimationFrame(this.animationFrame);
      this.animationFrame = null;
    }
    this.context?.clearRect(0, 0, this.width || 0, this.height || 0);
    this.particles = [];
  }

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    this.width = Math.max(1, rect.width);
    this.height = Math.max(1, rect.height);
    this.pixelRatio = window.devicePixelRatio || 1;
    this.canvas.width = Math.floor(this.width * this.pixelRatio);
    this.canvas.height = Math.floor(this.height * this.pixelRatio);
    this.context.setTransform(this.pixelRatio, 0, 0, this.pixelRatio, 0, 0);
  }

  createParticles(count) {
    for (let i = 0; i < count; i++) {
      this.particles.push(new WindParticle(this.width, this.height));
    }
  }

  render() {
    if (!this.isRunning) return;
    this.animationFrame = requestAnimationFrame(this.boundRender);
    this.context.clearRect(0, 0, this.width, this.height);

    if (this.clipPath) {
      this.context.save();
      this.clipPath(this.context);
      this.context.clip();
    }

    this.particles.forEach(p => p.update(this.width, this.height));
    this.particles.forEach(p => p.draw(this.context));

    if (this.clipPath) {
      this.context.restore();
    }
  }
}

class WindParticle {
  constructor(width, height) {
    this.init(width, height, true);
  }

  init(width, height, randomX = false) {
    this.x = randomX ? Math.random() * (width + 200) - 100 : -100;
    this.y = Math.random() * height;
    this.length = 60 + Math.random() * 100;
    this.speed = 3 + Math.random() * 4;
    this.opacity = 0.05 + Math.random() * 0.2;
    this.lineWidth = 0.5 + Math.random() * 1.2;
    this.drift = (Math.random() - 0.5) * 0.2;
    this.freq = 0.01 + Math.random() * 0.02;
  }

  update(width, height) {
    this.x += this.speed;
    this.y += Math.sin(this.x * this.freq) * 0.5 + this.drift;
    
    if (this.x > width + this.length) {
      this.init(width, height);
    }
  }

  draw(ctx) {
    ctx.save();
    const grad = ctx.createLinearGradient(this.x - this.length, this.y, this.x, this.y);
    grad.addColorStop(0, "rgba(22, 163, 74, 0)");
    grad.addColorStop(0.4, `rgba(22, 163, 74, ${this.opacity})`);
    grad.addColorStop(1, "rgba(22, 163, 74, 0)");
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = this.lineWidth;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(this.x - this.length, this.y);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    ctx.restore();
  }
}

function getCurrentForecastPeriod() {
  if (!forecastData || forecastData.list.length === 0) return null;

  const now = Date.now();
  return forecastData.list.find((period) => (period.dt * 1000) >= now) || forecastData.list[0];
}

function formatWindDirection(degrees) {
  if (typeof degrees !== "number" || Number.isNaN(degrees)) return "";

  const directions = ["উত্তর", "উত্তর-পূর্ব", "পূর্ব", "দক্ষিণ-পূর্ব", "দক্ষিণ", "দক্ষিণ-পশ্চিম", "পশ্চিম", "উত্তর-পশ্চিম"];
  const index = Math.round(degrees / 45) % directions.length;
  return directions[index];
}

function formatNumber(value) {
  return numberFormatter.format(Math.round(value));
}

function getAverageWindDirection(periods) {
  if (!periods.length) return null;

  const vectors = periods.reduce((totals, period) => {
    if (typeof period.wind.deg !== "number" || Number.isNaN(period.wind.deg)) {
      return totals;
    }

    const radians = period.wind.deg * Math.PI / 180;
    totals.sin += Math.sin(radians);
    totals.cos += Math.cos(radians);
    totals.count += 1;
    return totals;
  }, { sin: 0, cos: 0, count: 0 });

  if (!vectors.count) return null;

  const degrees = Math.atan2(vectors.sin / vectors.count, vectors.cos / vectors.count) * 180 / Math.PI;
  return (degrees + 360) % 360;
}

function getAverageWindSpeed(periods) {
  if (!periods.length) return null;

  const total = periods.reduce((sum, period) => sum + (period.wind.speed || 0), 0);
  return total / periods.length;
}

function formatWindSummary(speed, degrees) {
  if (typeof speed !== "number" || Number.isNaN(speed)) return "";

  const convertedSpeed = isCelsius ? speed * 3.6 : speed * 2.237;
  const direction = formatWindDirection(degrees);
  return `${formatNumber(convertedSpeed)} ${isCelsius ? "কিমি/ঘণ্টা" : "মাইল/ঘণ্টা"}${direction ? ` ${direction}` : ""}`;
}

// Update UI
function updateUI() {
  loadingDiv.classList.add("hidden");
  errorDiv.classList.add("hidden");
  dashboardContent.classList.remove("hidden");

  renderCurrentWeather();
  renderChart();
  renderForecast();
}

function renderCurrentWeather() {
  const temp = isCelsius ? weatherData.main.temp : (weatherData.main.temp * 9/5) + 32;
  currentTempEl.textContent = formatNumber(temp);
  
  const iconCode = weatherData.weather[0].icon;
  currentIconEl.src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;
  updateWeatherAnimation(weatherData.weather[0], weatherData.main.temp);
  
  // OpenWeather current API doesn't always have pop (probability of precipitation)
  // We'll fallback to the next forecast period.
  let precip = 0;
  const currentForecastPeriod = getCurrentForecastPeriod();
  if (currentForecastPeriod) {
    precip = Math.round((currentForecastPeriod.pop || 0) * 100);
  }
  
  currentPrecipEl.textContent = `${formatNumber(precip)}%`;
  currentHumidityEl.textContent = `${formatNumber(weatherData.main.humidity)}%`;
  
  const windSpeed = isCelsius ? (weatherData.wind.speed * 3.6) : (weatherData.wind.speed * 2.237);
  const currentWindDirection = formatWindDirection(
    weatherData.wind.deg ?? currentForecastPeriod?.wind?.deg
  );
  currentWindEl.textContent = `${formatNumber(windSpeed)} ${isCelsius ? 'কিমি/ঘণ্টা' : 'মাইল/ঘণ্টা'}${currentWindDirection ? ` ${currentWindDirection}` : ''}`;
  
  cityNameEl.textContent = weatherData.name;
  
  const date = new Date(weatherData.dt * 1000);
  currentDayTimeEl.textContent = date.toLocaleString(locale, {
    weekday: "long",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  });
  currentConditionEl.textContent = weatherData.weather[0].description;
}

function renderChart() {
  const ctx = document.getElementById('weatherChart').getContext('2d');
  
  if (weatherChart) {
    weatherChart.destroy();
  }

  // Seven-day forecast sampled every 3 hours for readability.
  const periods = forecastData.list;
  
  // Dynamically set width for scrollable area (60px per point)
  const chartWrapper = document.getElementById('chart-wrapper');
  chartWrapper.style.minWidth = `${Math.max(800, periods.length * 60)}px`;

  const labels = periods.map(item => {
    const date = new Date(item.dt * 1000);
    return date.toLocaleTimeString(locale, {
      hour: "numeric",
      hour12: true
    });
  });

  let data = [];
  let label = "";
  let bgColor = "rgba(37, 99, 235, 0.1)";
  let borderColor = "#2563eb";

  if (currentTab === "temperature") {
    data = periods.map(item => isCelsius ? item.main.temp : (item.main.temp * 9/5) + 32);
    label = `তাপমাত্রা (${isCelsius ? '°C' : '°F'})`;
  } else if (currentTab === "precipitation") {
    data = periods.map(item => (item.pop || 0) * 100);
    label = "বৃষ্টির সম্ভাবনা (%)";
    bgColor = "rgba(14, 165, 233, 0.1)";
    borderColor = "#0ea5e9";
  } else if (currentTab === "wind") {
    data = periods.map(item => isCelsius ? (item.wind.speed * 3.6) : (item.wind.speed * 2.237));
    label = `বাতাসের গতি (${isCelsius ? 'কিমি/ঘণ্টা' : 'মাইল/ঘণ্টা'})`;
    bgColor = "rgba(22, 163, 74, 0.1)";
    borderColor = "#16a34a";
  }

  weatherChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: label,
        data: data,
        backgroundColor: (context) => {
          const chart = context.chart;
          const {ctx, chartArea} = chart;
          if (!chartArea) return null;
          const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          if (currentTab === "temperature") {
            gradient.addColorStop(0, 'rgba(255, 99, 71, 0.25)'); // Tomato/Warm
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0.05)'); // Blue/Cool
          } else if (currentTab === "precipitation") {
            gradient.addColorStop(0, 'rgba(14, 165, 233, 0.3)');
            gradient.addColorStop(1, 'rgba(14, 165, 233, 0)');
          } else {
            gradient.addColorStop(0, 'rgba(22, 163, 74, 0.25)');
            gradient.addColorStop(1, 'rgba(22, 163, 74, 0)');
          }
          return gradient;
        },
        borderColor: (context) => {
          if (currentTab !== "temperature") return borderColor;
          const chart = context.chart;
          const {ctx, chartArea} = chart;
          if (!chartArea) return borderColor;
          const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          gradient.addColorStop(0, '#ef4444'); // Hot
          gradient.addColorStop(1, '#3b82f6'); // Cold
          return gradient;
        },
        borderWidth: 3,
        fill: true,
        tension: 0.45,
        pointBackgroundColor: "#ffffff",
        pointBorderColor: borderColor,
        pointBorderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 6,
        pointHoverBorderWidth: 3,
        pointHoverBackgroundColor: (context) => {
          if (currentTab === "temperature") return "#ef4444";
          return borderColor;
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      hover: {
        mode: 'index',
        intersect: false
      },
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: true,
          position: 'nearest',
          backgroundColor: 'rgba(255, 255, 255, 0.95)',
          titleColor: '#1a1c1e',
          bodyColor: '#1a1c1e',
          borderColor: '#e1e2ec',
          borderWidth: 1,
          padding: 12,
          boxPadding: 6,
          usePointStyle: true,
          titleFont: { size: 14, weight: '600' },
          bodyFont: { size: 13 },
          cornerRadius: 12,
          displayColors: false,
          callbacks: {
            label: function(context) {
              let val = formatNumber(context.parsed.y);
              let unit = "";
              if (currentTab === "temperature") unit = isCelsius ? "°C" : "°F";
              else if (currentTab === "precipitation") unit = "%";
              else unit = isCelsius ? " কিমি/ঘ" : " মাইল/ঘ";
              return `${context.dataset.label}: ${val}${unit}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false, drawBorder: false },
          ticks: { 
            color: "#667085", 
            font: { size: 11, weight: '500' },
            maxRotation: 0,
            autoSkip: true,
            padding: 8
          }
        },
        y: {
          display: false,
          min: Math.min(...data) - (currentTab === "temperature" ? 8 : 2),
          max: Math.max(...data) + (currentTab === "temperature" ? 8 : 15)
        }
      },
      layout: {
        padding: { top: 35, bottom: 10 }
      },
      animation: {
        duration: 1000,
        easing: 'easeOutQuart'
      }
    },
    plugins: [{
      id: 'crosshair',
      afterDraw: (chart) => {
        if (chart.tooltip?._active?.length) {
          const {ctx} = chart;
          const {top, bottom} = chart.chartArea;
          const activePoint = chart.tooltip._active[0];
          const {x} = activePoint.element;
          
          ctx.save();
          ctx.beginPath();
          ctx.setLineDash([5, 5]);
          ctx.moveTo(x, top);
          ctx.lineTo(x, bottom);
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'rgba(0, 90, 193, 0.4)';
          ctx.stroke();
          ctx.restore();
        }
      }
    }, {
      id: 'topLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data } = chart;
        ctx.save();
        ctx.font = '600 12px Hind Siliguri';
        ctx.fillStyle = '#1A1B1F';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        
        const meta = chart.getDatasetMeta(0);
        meta.data.forEach((point, index) => {
          const value = formatNumber(data.datasets[0].data[index]);
          if (currentTab === "wind") {
            const windDir = formatWindDirection(periods[index].wind.deg);
            ctx.fillText(value, point.x, point.y - 28);
            ctx.font = '500 10px Hind Siliguri';
            ctx.fillStyle = '#44474E';
            ctx.fillText(windDir, point.x, point.y - 12);
            ctx.font = '600 12px Hind Siliguri';
            ctx.fillStyle = '#1A1B1F';
          } else {
            ctx.fillText(value + (currentTab === "precipitation" ? "%" : "°"), point.x, point.y - 10);
          }
        });
        ctx.restore();
      }
    }]
  });

  // Handle Chart Rain Effect
  if (currentTab === "precipitation") {
    if (!chartRainRenderer && chartRainCanvasEl) {
      chartRainRenderer = new RainRenderer(chartRainCanvasEl);
    }
    
    if (chartRainRenderer) {
      chartRainRenderer.setClipPath((ctx) => {
        const meta = weatherChart.getDatasetMeta(0);
        const points = meta.data;
        const yScale = weatherChart.scales.y;
        
        if (points.length > 0) {
          ctx.beginPath();
          ctx.moveTo(points[0].x, yScale.bottom);
          points.forEach(p => ctx.lineTo(p.x, p.y));
          ctx.lineTo(points[points.length - 1].x, yScale.bottom);
          ctx.closePath();
        }
      });
      chartRainRenderer.start();
    }
  } else {
    chartRainRenderer?.stop();
  }

  // Handle Chart Wind Effect
  if (currentTab === "wind") {
    if (!chartWindRenderer && chartWindCanvasEl) {
      chartWindRenderer = new WindRenderer(chartWindCanvasEl);
    }
    
    if (chartWindRenderer) {
      chartWindRenderer.setClipPath((ctx) => {
        const meta = weatherChart.getDatasetMeta(0);
        const points = meta.data;
        const yScale = weatherChart.scales.y;
        
        if (points.length > 0) {
          ctx.beginPath();
          ctx.moveTo(points[0].x, yScale.bottom);
          points.forEach(p => ctx.lineTo(p.x, p.y));
          ctx.lineTo(points[points.length - 1].x, yScale.bottom);
          ctx.closePath();
        }
      });
      chartWindRenderer.start();
    }
  } else {
    chartWindRenderer?.stop();
  }
}

function renderForecastLegacy() {
  forecastContainer.innerHTML = '';
  
  // Group by day
  const dailyData = {};
  forecastData.list.forEach((item, index) => {
    const date = new Date(item.dt * 1000);
    const dayName = date.toLocaleDateString(locale, { weekday: 'short' });
    
    if (!dailyData[dayName]) {
      dailyData[dayName] = {
        temps: [],
        icon: item.weather[0].icon,
        firstIndex: index
      };
    }
    dailyData[dayName].temps.push(item.main.temp);
  });

  const days = Object.keys(dailyData).slice(0, 5); // Legacy renderer retained only for reference.
  
  days.forEach((day, index) => {
    const data = dailyData[day];
    const maxTemp = Math.max(...data.temps);
    const minTemp = Math.min(...data.temps);
    
    const displayMax = formatNumber(isCelsius ? maxTemp : (maxTemp * 9/5) + 32);
    const displayMin = formatNumber(isCelsius ? minTemp : (minTemp * 9/5) + 32);
    
    const card = document.createElement("div");
    card.className = `forecast-card ${index === 0 ? 'active' : ''}`;
    
    card.innerHTML = `
      <div class="forecast-day">${day}</div>
      <img src="https://openweathermap.org/img/wn/${data.icon}.png" alt="আইকন" class="forecast-icon">
      <div class="forecast-temps">
        <span class="temp-high">${displayMax}°</span>
        <span class="temp-low">${displayMin}°</span>
      </div>
    `;
    
    card.addEventListener('click', () => {
      // Update active state
      document.querySelectorAll('.forecast-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      
      // Scroll the chart to this day's first forecast point
      const chartContainer = document.querySelector('.chart-container');
      const chartWrapper = document.getElementById('chart-wrapper');
      
      const totalPoints = forecastData.list.length;
      // Calculate how wide each point is on the screen
      const pointWidth = chartWrapper.scrollWidth / totalPoints;
      
      // Scroll to that position smoothly
      chartContainer.scrollTo({
        left: data.firstIndex * pointWidth,
        behavior: 'smooth'
      });
    });
    
    forecastContainer.appendChild(card);
  });
}

}
