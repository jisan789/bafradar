<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AERO-INTEL | Live Tactical Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070a;
      --sidebar: #0a0d14;
      --card: #11151f;
      --border: #1e2633;
      --accent: #00f2ff;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --live: #00ff9d;
    }

    /* Standard Animations for the Loader */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes swing {
      0%, 100% { transform: rotate(-15deg); }
      50% { transform: rotate(15deg); }
    }
    @keyframes waveDash {
      0% { stroke-dasharray: 0, 120; stroke-dashoffset: 0; }
      50% { stroke-dasharray: 60, 120; stroke-dashoffset: -30; }
      100% { stroke-dasharray: 0, 120; stroke-dashoffset: -120; }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .animate-spin-slow { animation: spin 8s linear infinite; }
    .animate-spin-reverse { animation: spin-reverse 5s linear infinite; }
    .animate-swing { animation: swing 1.8s ease-in-out infinite; transform-origin: center; }
    .animate-wave { animation: waveDash 2.2s linear infinite; }
    .animate-bob { animation: bob 2.4s ease-in-out infinite; }

    * { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Sidebar --- */
    aside {
      width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .brand-area {
      padding: 30px 24px;
      border-bottom: 1px solid var(--border);
    }

    .status-dot {
      width: 8px; height: 8px; background: var(--live);
      border-radius: 50%; box-shadow: 0 0 10px var(--live);
      display: inline-block; margin-right: 8px;
    }

    nav { padding: 20px; flex: 1; }
    .nav-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
    
    .nav-item {
      padding: 12px 16px; border-radius: 8px; margin-bottom: 4px;
      font-size: 13px; font-weight: 600; color: var(--accent);
      background: rgba(0, 242, 255, 0.05); display: flex; align-items: center; gap: 10px;
    }

    /* --- Main --- */
    main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
    
    .top-bar {
      padding: 20px 40px; background: rgba(5, 7, 10, 0.9);
      backdrop-filter: blur(10px); display: flex; justify-content: space-between;
      align-items: center; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 90;
    }

    #live-time { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--accent); }

    .content-padding { padding: 40px; }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 24px;
    }

    .data-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .card-header {
      padding: 12px 16px; background: rgba(0,0,0,0.2);
      display: flex; justify-content: space-between; align-items: center;
    }

    .tag-live {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--live); border: 1px solid rgba(0,255,157,0.3);
      padding: 2px 8px; border-radius: 4px;
    }

    /* --- Loader Layer --- */
    .img-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
    }

    .loader-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: var(--card);
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: relative;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .img-wrapper img.loaded { opacity: 1; }
    .img-wrapper img.loaded + .loader-container { display: none; }

    /* --- Viewer --- */
    #viewer {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 1000; flex-direction: column;
    }
    .viewer-header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; }
    #v-img { max-width: 95%; max-height: 85vh; transition: transform 0.3s ease; }

    @media (max-width: 768px) {
      aside { display: none; }
      .weather-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <aside>
    <div class="brand-area">
      <div style="font-family: 'JetBrains Mono'; font-weight: 800; font-size: 18px;">
        <span class="status-dot"></span>AERO-INTEL
      </div>
      <div style="font-size: 10px; color: var(--text-dim); margin-top: 5px;">LIVE MET-TERMINAL</div>
    </div>
    <nav>
      <span class="nav-label">Active Feeds</span>
      <div class="nav-item">📡 Radar Network (Live)</div>
      <div class="nav-item">📡 Satellite Stream</div>
    </nav>
    <div style="padding: 20px; font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border);">
       Warning: Verify UTC timestamps on imagery for mission-critical tasks.
    </div>
  </aside>

  <main>
    <header class="top-bar">
      <div>
        <h1 style="margin: 0; font-size: 18px;">Tactical Weather Dashboard</h1>
        <div style="font-size: 11px; color: var(--text-dim);">Unified BAF Intelligence Feed</div>
      </div>
      <div style="text-align: right;">
        <div id="live-time">00:00:00</div>
        <div id="live-date" style="font-size: 10px; color: var(--text-dim); letter-spacing: 1px;">---</div>
      </div>
    </header>

    <div class="content-padding">
      <div class="weather-grid" id="main-grid">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </main>

  <div id="viewer">
    <div class="viewer-header">
      <div id="v-title" style="font-family: 'JetBrains Mono'; color: var(--accent);">IMAGE_INSPECTION</div>
      <button onclick="closeViewer()" style="background: #ff4757; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">CLOSE</button>
    </div>
    <div class="viewer-body">
      <img src="" id="v-img" onclick="toggleZoom()" title="Click to zoom">
    </div>
  </div>

  <script>
    const FEEDS = [
      { id: 'ZHR_PRIMARY', src: 'https://wx.baf.mil.bd/FTP_Folder/zhrradar.jpg' },
      { id: 'ZHR_SECONDARY', src: 'https://wx.baf.mil.bd/FTP_Folder/zhrradar2.jpg' },
      { id: 'ZHR_TERTIARY', src: 'https://wx.baf.mil.bd/FTP_Folder/zhrradar3.jpg' },
      { id: 'MOS_RADAR', src: 'https://wx.baf.mil.bd/FTP_Folder/mosradar.jpg' },
      { id: 'MTR_ANALYSIS', src: 'https://wx.baf.mil.bd/FTP_Folder/mtr.jpg' },
      { id: 'ZHR_ANIM_LOOP', src: 'https://wx.baf.mil.bd/FTP_Folder/ZHRANIM.gif' },
      { id: 'MTR_ANIM_LOOP', src: 'https://wx.baf.mil.bd/FTP_Folder/mtranim.gif' }
    ];

    const LOADER_HTML = `
      <div class="loader-container">
        <div style="width: 100px; height: 100px; color: #0892A5; position: relative;">
          <svg viewBox="0 0 120 120" style="width: 100%; height: 100%;">
            <g class="animate-spin-slow" style="transform-origin: center;">
              <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25"></circle>
              <g stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6">
                <line x1="60" y1="6" x2="60" y2="12"></line>
                <line x1="60" y1="108" x2="60" y2="114"></line>
                <line x1="6" y1="60" x2="12" y2="60"></line>
                <line x1="108" y1="60" x2="114" y2="60"></line>
              </g>
            </g>
            <g class="animate-spin-reverse" style="transform-origin: center;">
              <polygon points="60,22 66,60 60,98 54,60" fill="#C9910D" opacity="0.95"></polygon>
              <polygon points="22,60 60,66 98,60 60,54" fill="#0892A5" opacity="0.9"></polygon>
            </g>
            <g class="animate-swing">
              <line x1="60" y1="60" x2="60" y2="18" stroke="#C9910D" stroke-width="3" stroke-linecap="round"></line>
            </g>
            <path d="M12 82 Q 24 76 36 82 T 60 82 T 84 82 T 108 82" fill="none" stroke="#0892A5" stroke-width="3" class="animate-wave"></path>
          </svg>
        </div>
      </div>
    `;

    function init() {
      const grid = document.getElementById('main-grid');
      FEEDS.forEach(feed => {
        const card = document.createElement('div');
        card.className = 'data-card';
        card.innerHTML = `
          <div class="card-header">
            <span style="font-family: 'JetBrains Mono'; font-size: 11px;">${feed.id}</span>
            <span class="tag-live">LIVE</span>
          </div>
          <div class="img-wrapper" onclick="openViewer('${feed.src}', '${feed.id}')">
            <img src="${feed.src}" onload="this.classList.add('loaded')" onerror="handleError(this)">
            ${LOADER_HTML}
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function handleError(img) {
      img.style.display = 'none';
      img.nextElementSibling.innerHTML = '<div style="color:#ff4757; font-size:10px; font-family:JetBrains Mono">FEED_OFFLINE</div>';
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('live-time').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
      document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' }).toUpperCase();
    }

    function openViewer(src, id) {
      const v = document.getElementById('viewer');
      document.getElementById('v-img').src = src;
      document.getElementById('v-title').innerText = `INSPECTING_NODE: ${id}`;
      v.style.display = 'flex';
    }

    function closeViewer() {
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('v-img').style.transform = 'scale(1)';
    }

    let zoomed = false;
    function toggleZoom() {
      zoomed = !zoomed;
      document.getElementById('v-img').style.transform = zoomed ? 'scale(2)' : 'scale(1)';
      document.getElementById('v-img').style.cursor = zoomed ? 'zoom-out' : 'zoom-in';
    }

    setInterval(updateClock, 1000);
    init();
    updateClock(); 
  </script>
</body>
</html>
